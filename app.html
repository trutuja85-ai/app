<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: arial,sana-serif;

        }
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
            flex-direction: column;

        }
        body>div{
            text-align: center;
            
        }
        h1{
            margin-bottom: 20px;
            color:#333;

        }
        div div{
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        button{
            padding: 12px 24px;
            border:none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
            color: black;


        }
        .btn{
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
            color: black;

        }
        button:nth-child(3){
            background-color: teal;

        }
        button:first-child{
            background-color: #28a745;
        }
        button-first-child:hover{
            background-color: #218838;
        }
        button:nth-child(2){
            background-color: #ffc107;
        }
        button:nth-child(2){
            background-color: #e0a800;
        }
        button:last-child{
            background-color:#dc3545 ;
        }
        button-last-child:hover{
            background-color: #c82333;
        }
           </style>
</head>
<body>
    <h1>counter app</h1>
    <h2 id="countid">0</h2>
    <div>
        <button onclick="inc()">+</button>
        <button onclick="reset()">reset</button>
        <button onclick="dec()" style="background-color: #218838; padding:  12px 24px;" class="btn">-</button>
        </div>
<script>
    let count=0;
    function update(){
        document.getElementById("countid").innerText=count;

    }
    function inc(){
        //count+=1
        count++;
        update()
    }
    function dec(){
        count--;
        update()
    }
    function reset(){
        count=0;
        update()
    }
</script>    
</body>
</html>
